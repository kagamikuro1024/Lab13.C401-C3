version: '3.8'

services:
  # FastAPI Backend
  api:
    container_name: ta-chatbot-api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - PORT=8000
      - LOG_LEVEL=INFO
    volumes:
      - ./app:/app/app
      - ./utils:/app/utils
      - ./tools:/app/tools
      - ./rag:/app/rag
      - ./knowledge_base:/app/knowledge_base
      - ./faiss_index:/app/faiss_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    networks:
      - ta-network

  # Optional: Redis for session management
  # redis:
  #   container_name: ta-redis
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis-data:/data
  #   restart: unless-stopped
  #   networks:
  #     - ta-network

  # Optional: PostgreSQL for metrics storage
  # postgres:
  #   container_name: ta-postgres
  #   image: postgres:15-alpine
  #   ports:
  #     - "5432:5432"
  #   environment:
  #     - POSTGRES_DB=ta_chatbot
  #     - POSTGRES_USER=admin
  #     - POSTGRES_PASSWORD=${DB_PASSWORD}
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   networks:
  #     - ta-network

networks:
  ta-network:
    driver: bridge

